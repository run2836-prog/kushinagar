<!DOCTYPE html>
<html lang="hi">
<head>
    <meta content="5c918338ae3e1ee41d618410010a7c67" name="skytraffix-site-verification" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S NEWS LUCKNOW 24 · लाइव</title>
    <!-- Font Awesome 6 (free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #f2f2f2;
        }

        /* ---------- रेड हेडर (मांग 9) ---------- */
        .red-header {
            background: #c00000;  /* गहरा लाल */
            color: white;
            padding: 8px 20px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            border-bottom: 3px solid #8b0000;
        }

        /* लोगो + टाइटल (मांग 2) */
        .logo-area {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .logo {
            background: white;
            color: #c00000;
            font-weight: 900;
            font-size: 28px;
            padding: 5px 15px;
            border-radius: 50px 10px 10px 50px;
            box-shadow: 2px 2px 0 #630000;
            letter-spacing: 1px;
        }
        .logo i {
            color: #c00000;
            font-size: 30px;
            margin-right: 5px;
        }

        .buro-details {
            background: rgba(255,255,240,0.15);
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 0.95rem;
            border-left: 3px solid #ffd966;
            line-height: 1.5;
        }
        .buro-details i {
            margin-right: 6px;
            color: #ffd966;
        }
        .buro-details strong {
            color: #fff5b0;
        }

        /* ऊपर लाइव टाइम (मांग 4) और एडमिन बटन (मांग 7) */
        .top-right-panel {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .live-time {
            background: #1e1e1e;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1.2rem;
            letter-spacing: 1px;
            box-shadow: 0 0 0 2px #ffbf00;
        }
        .live-time i {
            color: #ff5e5e;
            margin-right: 8px;
            animation: blink 1.3s infinite;
        }
        @keyframes blink { 0%{opacity:1;} 50%{opacity:0.3;} 100%{opacity:1;} }

        .admin-btn {
            background: white;
            color: #c00000;
            border: none;
            padding: 10px 18px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 3px 0 #990000;
            transition: 0.1s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .admin-btn i {
            color: #c00000;
            font-size: 1.2rem;
        }
        .admin-btn:active {
            transform: translateY(3px);
            box-shadow: none;
        }

        /* रनिंग टिकर (मांग 3) */
        .ticker-wrap {
            background: #111;
            color: #ffd966;
            padding: 10px 0;
            border-bottom: 2px solid #c00000;
            overflow: hidden;
        }
        .ticker {
            display: inline-block;
            white-space: nowrap;
            animation: moveTicker 30s linear infinite;
            font-size: 1.3rem;
            font-weight: 600;
        }
        .ticker span {
            margin-right: 50px;
            background: #c00000;
            padding: 4px 14px;
            border-radius: 30px;
            color: white;
            font-size: 1rem;
            margin-left: 15px;
        }
        @keyframes moveTicker {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* मुख्य ग्रिड (मांग 1) */
        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
            padding: 30px 20px;
            max-width: 1400px;
            margin: auto;
        }

        /* पोस्ट कार्ड */
        .post-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: 0.2s;
            border-top: 5px solid #c00000;
            display: flex;
            flex-direction: column;
        }
        .post-card:hover {
            transform: scale(1.01);
            box-shadow: 0 10px 25px #c0000050;
        }

        .post-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #ddd;
            display: block;
        }

        .post-content {
            padding: 18px 18px 12px;
        }
        .post-content h1 {
            font-size: 1.8rem;
            color: #1e1e1e;
            margin-bottom: 5px;
            line-height: 1.2;
        }
        .post-content h2 {
            font-size: 1.3rem;
            color: #c00000;
            font-weight: 500;
            margin-bottom: 10px;
            border-left: 4px solid #c00000;
            padding-left: 10px;
        }
        .post-date {
            color: #555;
            font-size: 0.85rem;
            margin: 8px 0 12px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .post-date i {
            color: #c00000;
        }

        /* शेयर बटन (मांग 6) */
        .share-row {
            display: flex;
            gap: 12px;
            padding: 0 18px 18px 18px;
            margin-top: auto;
        }
        .whatsapp-btn, .facebook-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            color: white;
            transition: 0.2s;
            font-size: 1rem;
            text-decoration: none;
        }
        .whatsapp-btn { background: #25D366; }
        .facebook-btn { background: #1877F2; }
        .whatsapp-btn:hover { background: #128C7E; }
        .facebook-btn:hover { background: #145dbb; }

        /* एडमिन पैनल (मांग 5) – छिपा हुआ डिफ़ॉल्ट */
        .admin-panel-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .admin-panel {
            background: white;
            width: 90%;
            max-width: 600px;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 20px 40px black;
            border: 3px solid #c00000;
        }
        .admin-panel h2 {
            color: #c00000;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }
        .admin-panel input, .admin-panel textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #ccc;
            border-radius: 40px;
            font-size: 1rem;
        }
        .admin-panel textarea { border-radius: 20px; resize: vertical; }
        .file-label {
            background: #c00000;
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            display: inline-block;
            margin: 10px 0;
            cursor: pointer;
        }
        .admin-panel button {
            background: #c00000;
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 40px;
            font-size: 1.2rem;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
        }
        .close-admin {
            float: right;
            background: #333;
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 1.2rem;
            cursor: pointer;
        }

        /* फुटर (मांग 8 / 9) */
        footer {
            background: #1e1e1e;
            color: #eee;
            text-align: center;
            padding: 25px;
            font-size: 1.2rem;
            border-top: 6px solid #c00000;
        }
        footer i {
            color: #c00000;
        }
    </style>
</head>

<body>

    <!-- लाल हेडर (मांग 9) + सारी चीजें -->
    <header class="red-header">
        <div class="logo-area">
            <div class="logo">
                <i class="fas fa-newspaper"></i> S NEWS
            </div>
            <div class="buro-details">
                <i class="fas fa-map-marker-alt"></i> <strong>ब्यूरो चीफ रिपोर्टर:</strong> अशोक कुमार कनौजिया, चारबाग़ लखनऊ <br>
                <i class="fas fa-phone-alt"></i> मो. 9984296868
            </div>
        </div>

        <div class="top-right-panel">
            <div class="live-time" id="liveClock">
                <i class="fas fa-circle"></i> 
                <span id="timeDisplay"></span>
            </div>
            <!-- एडमिन बटन (मांग 7 / 5) -->
            <button class="admin-btn" id="adminLoginBtn"><i class="fas fa-lock"></i> एडमिन</button>
        </div>
    </header>

    <!-- रनिंग टेक्स्ट (मांग 3)  - डायनामिक रूप से निकलेगा नीचे से -->
    <div class="ticker-wrap" id="tickerWrapper">
        <div class="ticker" id="tickerText">
            <!-- JS से भरेगा -->
        </div>
    </div>

    <!-- न्यूज़ ग्रिड (मांग 1) - पोस्ट यहाँ दिखेंगे -->
    <main class="news-grid" id="newsGrid">
        <!-- डमी पोस्ट दिखाने के लिए कुछ उदाहरण (हटाया जा सकता है) -->
    </main>

    <!-- फुटर कॉपीराइट (मांग 9) -->
    <footer>
        <i class="far fa-copyright"></i> 2026 S NEWS LUCKNOW 24 | सर्वाधिकार सुरक्षित
    </footer>

    <!-- एडमिन पैनल (पासवर्ड 123 से खुलेगा) -->
    <div class="admin-panel-overlay" id="adminOverlay">
        <div class="admin-panel" id="adminPanel">
            <button class="close-admin" id="closeAdminBtn"><i class="fas fa-times"></i></button>
            <h2><i class="fas fa-user-shield"></i> एडमिन – नई पोस्ट डालें</h2>
            <input type="text" id="postH1" placeholder="H1 शीर्षक (बड़ा)">
            <input type="text" id="postH2" placeholder="H2 उपशीर्षक (छोटा)">
            <textarea id="postDesc" placeholder="विवरण / खबर (वैकल्पिक)" rows="2"></textarea>
            
            <label for="postImageInput" class="file-label"><i class="fas fa-image"></i> इमेज चुनें (H1 और H2 के बीच)</label>
            <input type="file" id="postImageInput" accept="image/*" style="display: none;">
            
            <button id="publishPostBtn"><i class="fas fa-paper-plane"></i> पोस्ट प्रकाशित करें</button>
            <p style="margin-top: 12px; color: gray; font-size:0.9rem;">पासवर्ड: 123 (एडमिन बटन पर क्लिक करें)</p>
        </div>
    </div>

    <!-- पासवर्ड प्रॉम्प्ट के लिए छोटा डायलॉग (मांग 5) -->
    <div style="display: none;" id="passwordPrompt"></div>

    <script>
        (function() {
            // ---------- स्टोरेज से पोस्ट लोड करना या डिफ़ॉल्ट पोस्ट ----------
            let posts = JSON.parse(localStorage.getItem('snews_posts')) || [];

            // अगर कोई पोस्ट न हो तो दो डेमो पोस्ट दिखाओ (सिर्फ उदाहरण)
            if (posts.length === 0) {
                posts = [
                    {
                        h1: "लखनऊ में मेट्रो का विस्तार",
                        h2: "चारबाग़ से सफेदाबाद तक 8 नए स्टेशन",
                        image: "https://images.unsplash.com/photo-1625076312529-7b119f0a1b4c?w=400&auto=format",
                        date: "11 मार्च 2026, 10:30 AM"
                    },
                    {
                        h1: "कानपुर रोड पर भीषण सड़क हादसा",
                        h2: "दो लोगों की मौत, तीन घायल",
                        image: "https://images.unsplash.com/photo-1589225936253-9af0c7f02f2e?w=400&auto=format",
                        date: "11 मार्च 2026, 8:15 AM"
                    },
                    {
                        h1: "यूपी विधानसभा में हंगामा",
                        h2: "सदन से निष्कासित किए गए 5 सदस्य",
                        image: "https://images.unsplash.com/photo-1541578076726-e3a7e1d85d28?w=400&auto=format",
                        date: "10 मार्च 2026, 6:40 PM"
                    }
                ];
                localStorage.setItem('snews_posts', JSON.stringify(posts));
            }

            // एलिमेंट्स
            const newsGrid = document.getElementById('newsGrid');
            const tickerTextDiv = document.getElementById('tickerText');
            const adminLoginBtn = document.getElementById('adminLoginBtn');
            const adminOverlay = document.getElementById('adminOverlay');
            const closeAdminBtn = document.getElementById('closeAdminBtn');
            const publishBtn = document.getElementById('publishPostBtn');
            const postImageInput = document.getElementById('postImageInput');
            const postH1 = document.getElementById('postH1');
            const postH2 = document.getElementById('postH2');
            const postDesc = document.getElementById('postDesc');  // extra, फिलहाल नहीं दिखा रहे लेकिन रख सकते हैं
            const liveClockSpan = document.getElementById('timeDisplay');

            // ---------- फंक्शन: सारी पोस्ट ग्रिड में रेंडर करो ----------
            function renderPosts() {
                if (!newsGrid) return;
                // ग्रिड को खाली करो
                newsGrid.innerHTML = '';
                // हर पोस्ट के लिए कार्ड बनाओ (सबसे नई पोस्ट पहले)
                const sortedPosts = [...posts].reverse();
                sortedPosts.forEach(post => {
                    const card = document.createElement('article');
                    card.className = 'post-card';

                    // इमेज (अगर मौजूद है)
                    if (post.image) {
                        const img = document.createElement('img');
                        img.src = post.image;
                        img.alt = post.h1;
                        img.className = 'post-img';
                        card.appendChild(img);
                    } else {
                        // नो इमेज प्लेसहोल्डर
                        const placeholder = document.createElement('div');
                        placeholder.style.background = '#ccc'; placeholder.style.height = '150px';
                        placeholder.style.display = 'flex'; placeholder.style.alignItems = 'center'; 
                        placeholder.style.justifyContent = 'center'; 
                        placeholder.innerHTML = '<i class="fas fa-image" style="font-size:40px; color:gray;"></i>';
                        card.appendChild(placeholder);
                    }

                    // कंटेंट डिव
                    const contentDiv = document.createElement('div');
                    contentDiv.className = 'post-content';
                    contentDiv.innerHTML = `
                        <h1>${escapeHtml(post.h1) || 'बिना शीर्षक'}</h1>
                        <h2>${escapeHtml(post.h2) || ''}</h2>
                        <div class="post-date"><i class="far fa-calendar-alt"></i> ${escapeHtml(post.date) || new Date().toLocaleString('hi-IN')}</div>
                        ${post.desc ? `<p>${escapeHtml(post.desc)}</p>` : ''}
                    `;
                    card.appendChild(contentDiv);

                    // शेयर रो (मांग 6)
                    const shareDiv = document.createElement('div');
                    shareDiv.className = 'share-row';
                    const whatsappUrl = `https://wa.me/?text=${encodeURIComponent(post.h1 + ' - ' + post.h2 + ' S NEWS LUCKNOW 24')}`;
                    const facebookUrl = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(window.location.href)}&quote=${encodeURIComponent(post.h1)}`;
                    
                    shareDiv.innerHTML = `
                        <a href="${whatsappUrl}" target="_blank" class="whatsapp-btn"><i class="fab fa-whatsapp"></i> व्हाट्सएप</a>
                        <a href="${facebookUrl}" target="_blank" class="facebook-btn"><i class="fab fa-facebook-f"></i> फेसबुक</a>
                    `;
                    card.appendChild(shareDiv);
                    newsGrid.appendChild(card);
                });
            }

            // साधारण एस्केप (XSS से बचाव)
            function escapeHtml(unsafe) {
                if (!unsafe) return unsafe;
                return unsafe.replace(/[&<>"]/g, function(m) {
                    if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; if (m === '"') return '&quot;';
                    return m;
                });
            }

            // ---------- रनिंग टेक्स्ट (मांग 3) : हर पोस्ट के H1 से बनेगा ----------
            function updateTicker() {
                if (!tickerTextDiv) return;
                // हर पोस्ट के h1 को लेकर ticker बनाओ
                const h1List = posts.map(p => p.h1).filter(h => h);
                if (h1List.length === 0) {
                    tickerTextDiv.innerHTML = '<span>ताज़ा खबर</span> लखनऊ समाचार 🔥 <span>न्यूज़</span>';
                    return;
                }
                // हर h1 के बाद "• NEWS" लगाओ
                const tickerContent = h1List.map(title => `${title} <span>✹ NEWS</span>`).join('  🔴  ');
                tickerTextDiv.innerHTML = tickerContent + '  🔴  ' + tickerContent;  // duplicate for smooth loop
            }

            // ---------- लाइव टाइम (मांग 4) ----------
            function updateLiveTime() {
                const now = new Date();
                const options = { weekday: 'short', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit', second:'2-digit' };
                const timeStr = now.toLocaleString('hi-IN', options);
                if (liveClockSpan) liveClockSpan.innerText = timeStr;
            }
            setInterval(updateLiveTime, 1000);
            updateLiveTime();

            // ---------- एडमिन पैनल पासवर्ड (मांग 5) ----------
            adminLoginBtn.addEventListener('click', function() {
                const pwd = prompt('एडमिन पासवर्ड डालें (123)');
                if (pwd === '123') {
                    adminOverlay.style.display = 'flex';
                } else {
                    alert('गलत पासवर्ड! केवल 123 स्वीकार्य है।');
                }
            });

            closeAdminBtn.addEventListener('click', function() {
                adminOverlay.style.display = 'none';
            });
            // बैकग्राउंड क्लिक से बंद
            adminOverlay.addEventListener('click', function(e) {
                if (e.target === adminOverlay) adminOverlay.style.display = 'none';
            });

            // ---------- नई पोस्ट प्रकाशित करना (मांग 1, H1, H2 और इमेज) ----------
            publishBtn.addEventListener('click', function() {
                const h1 = postH1.value.trim();
                const h2 = postH2.value.trim();
                // इमेज फाइल
                const file = postImageInput.files[0];
                if (!h1) {
                    alert('कृपया कम से कम H1 शीर्षक डालें');
                    return;
                }

                // अगर इमेज है तो उसे base64 में बदलो (स्थानीय स्टोरेज के लिए)
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const imageData = e.target.result;
                        addNewPost(h1, h2, imageData);
                    };
                    reader.readAsDataURL(file);
                } else {
                    // बिना इमेज के पोस्ट
                    addNewPost(h1, h2, null);
                }
            });

            function addNewPost(h1, h2, imageData) {
                const newPost = {
                    h1: h1,
                    h2: h2 || '',
                    image: imageData || '',  // base64 या खाली
                    date: new Date().toLocaleString('hi-IN', { year:'numeric', month:'long', day:'numeric', hour:'2-digit', minute:'2-digit' }),
                    desc: postDesc.value.trim() || ''
                };
                posts.push(newPost);
                localStorage.setItem('snews_posts', JSON.stringify(posts));
                // फॉर्म साफ करो
                postH1.value = ''; postH2.value = ''; postImageInput.value = ''; postDesc.value = '';
                adminOverlay.style.display = 'none';
                // री-रेंडर और टिकर अपडेट
                renderPosts();
                updateTicker();
            }

            // ---------- शुरू करो ----------
            renderPosts();
            updateTicker();

            // टिकर को हर बार नए पोस्ट पर ताज़ा करने के लिए (पहले से ही updateTicker कॉल हो रहा)
            // चूँकि posts बदल सकता है, हम render और ticker साथ में रखेंगे
            // ऊपर addNewPost में renderPosts और updateTicker कॉल कर दिया।

            // डेट के लिए मांग 8 (हर पोस्ट में दिख रहा है)
        })();
    </script>

    <!-- नोट: व्हाट्सएप/फेसबुक शेयर के लिए यूआरएल डायनामिक है -->
</body>
</html>
