    <!-- ZerAds के लिए जरूरी एलिमेंट (अब यह कार्ड के अंदर डाला जाएगा) -->
    <div id="ZerAds300" style="display: none;"></div>

    <script>
        (function() {
            // ========== डेली विज़िटर काउंटर ==========
            function updateVisitorCounter() {
                const today = new Date().toDateString(); // आज की तारीख (Mon Mar 12 2026)
                let visitorData = JSON.parse(localStorage.getItem('snews_visitors')) || { date: '', count: 0 };
                
                // अगर नई तारीख है या डेटा नहीं है तो रीसेट करें
                if (visitorData.date !== today) {
                    visitorData = { date: today, count: 0 };
                }
                
                // पहली बार आने वाले विज़िटर को ट्रैक करें (सिर्फ एक बार per session)
                const sessionKey = 'snews_session_visited';
                if (!sessionStorage.getItem(sessionKey)) {
                    visitorData.count += 1;
                    localStorage.setItem('snews_visitors', JSON.stringify(visitorData));
                    sessionStorage.setItem(sessionKey, 'true'); // इस सेशन में दोबारा न गिनें
                }
                
                // काउंटर दिखाएँ
                const counterSpan = document.getElementById('todayCount');
                if (counterSpan) {
                    counterSpan.textContent = visitorData.count;
                }
            }
            
            // काउंटर को तुरंत अपडेट करें
            updateVisitorCounter();
            
            // हर 30 सेकंड में काउंटर रीफ्रेश करें (अगर किसी और टैब ने बदला हो)
            setInterval(updateVisitorCounter, 30000);

            // ========== पोस्ट मैनेजमेंट ==========
            let posts = JSON.parse(localStorage.getItem('snews_posts')) || [];

            // अगर कोई पोस्ट न हो तो डेमो पोस्ट दिखाओ
            if (posts.length === 0) {
                posts = [
                    {
                        h1: "लखनऊ में मेट्रो का विस्तार",
                        h2: "चारबाग़ से सफेदाबाद तक 8 नए स्टेशन",
                        image: "https://images.unsplash.com/photo-1625076312529-7b119f0a1b4c?w=400&auto=format",
                        date: "11 मार्च 2026, 10:30 AM"
                    },
                    {
                        h1: "कानपुर रोड पर भीषण सड़क हादसा",
                        h2: "दो लोगों की मौत, तीन घायल",
                        image: "https://images.unsplash.com/photo-1589225936253-9af0c7f02f2e?w=400&auto=format",
                        date: "11 मार्च 2026, 8:15 AM"
                    },
                    {
                        h1: "यूपी विधानसभा में हंगामा",
                        h2: "सदन से निष्कासित किए गए 5 सदस्य",
                        image: "https://images.unsplash.com/photo-1541578076726-e3a7e1d85d28?w=400&auto=format",
                        date: "10 मार्च 2026, 6:40 PM"
                    }
                ];
                localStorage.setItem('snews_posts', JSON.stringify(posts));
            }

            // एलिमेंट्स
            const newsGrid = document.getElementById('newsGrid');
            const tickerTextDiv = document.getElementById('tickerText');
            const adminLoginBtn = document.getElementById('adminLoginBtn');
            const adminOverlay = document.getElementById('adminOverlay');
            const closeAdminBtn = document.getElementById('closeAdminBtn');
            const publishBtn = document.getElementById('publishPostBtn');
            const postImageInput = document.getElementById('postImageInput');
            const postH1 = document.getElementById('postH1');
            const postH2 = document.getElementById('postH2');
            const postDesc = document.getElementById('postDesc');
            const liveClockSpan = document.getElementById('timeDisplay');

            // ZerAds कोड - किसी खास एलिमेंट के लिए ZerAds लोड करने का फंक्शन
            function loadZerAdsForElement(element) {
                fetch('https://zerads.com/ad/ad.php?ref=10891&width=300')
                    .then(response => response.text())
                    .then(data => {
                        if (element.style.display === 'none') {
                            element.style.display = 'inline-block';
                            if (data.includes("*BLANK*") === false) {
                                data = data.replace('<meta http-equiv="refresh" content="280">', '');
                                element.innerHTML = "<iframe style='border:none;' width='300' height='250'></iframe>";
                                element.querySelector('iframe').srcdoc = data;
                            } else {
                                element.innerHTML = "insert your html code here.";
                            }
                        }
                    })
                    .catch(error => console.error('ZerAds load error:', error));
            }

            // पोस्ट रेंडर करो (अब इसमें एक एड कार्ड भी शामिल है)
            function renderPosts() {
                if (!newsGrid) return;
                newsGrid.innerHTML = '';
                
                // पोस्ट को उल्टा क्रम में दिखाएँ (नया पहले)
                const sortedPosts = [...posts].reverse();
                
                // हर 3 पोस्ट के बाद एक एड कार्ड डालें (यहाँ दूसरे स्थान पर)
                let postCount = 0;
                sortedPosts.forEach((post, index) => {
                    // पोस्ट कार्ड बनाएँ
                    const card = document.createElement('article');
                    card.className = 'post-card';

                    if (post.image) {
                        const img = document.createElement('img');
                        img.src = post.image;
                        img.alt = post.h1;
                        img.className = 'post-img';
                        card.appendChild(img);
                    } else {
                        const placeholder = document.createElement('div');
                        placeholder.style.background = '#ccc';
                        placeholder.style.height = '150px';
                        placeholder.style.display = 'flex';
                        placeholder.style.alignItems = 'center';
                        placeholder.style.justifyContent = 'center';
                        placeholder.innerHTML = '<i class="fas fa-image" style="font-size:40px; color:gray;"></i>';
                        card.appendChild(placeholder);
                    }

                    const contentDiv = document.createElement('div');
                    contentDiv.className = 'post-content';
                    contentDiv.innerHTML = `
                        <h1>${escapeHtml(post.h1) || 'बिना शीर्षक'}</h1>
                        <h2>${escapeHtml(post.h2) || ''}</h2>
                        <div class="post-date"><i class="far fa-calendar-alt"></i> ${escapeHtml(post.date) || new Date().toLocaleString('hi-IN')}</div>
                        ${post.desc ? `<p>${escapeHtml(post.desc)}</p>` : ''}
                    `;
                    card.appendChild(contentDiv);

                    const shareDiv = document.createElement('div');
                    shareDiv.className = 'share-row';
                    const whatsappUrl = `https://wa.me/?text=${encodeURIComponent(post.h1 + ' - ' + post.h2 + ' S NEWS LUCKNOW 24')}`;
                    const facebookUrl = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(window.location.href)}&quote=${encodeURIComponent(post.h1)}`;
                    
                    shareDiv.innerHTML = `
                        <a href="${whatsappUrl}" target="_blank" class="whatsapp-btn"><i class="fab fa-whatsapp"></i> व्हाट्सएप</a>
                        <a href="${facebookUrl}" target="_blank" class="facebook-btn"><i class="fab fa-facebook-f"></i> फेसबुक</a>
                    `;
                    card.appendChild(shareDiv);
                    newsGrid.appendChild(card);
                    
                    postCount++;

                    // हर 2 पोस्ट के बाद एक एड कार्ड डालें (दूसरे पोस्ट के बाद)
                    // और एड कार्ड को दोबारा न डालें (सिर्फ एक बार)
                    if (postCount === 2) {
                        const adCard = document.createElement('div');
                        adCard.className = 'ad-card';
                        adCard.innerHTML = `
                            <span class="ad-label"><i class="fas fa-ad"></i> विज्ञापन</span>
                            <div class="ad-container" id="zerads-container"></div>
                        `;
                        newsGrid.appendChild(adCard);
                        
                        // एड कंटेनर में ZerAds300 एलिमेंट को डालें
                        const container = adCard.querySelector('#zerads-container');
                        // पुराने ZerAds300 एलिमेंट को ढूंढें और उसे इस कंटेनर में ले जाएँ
                        const zeradsElement = document.getElementById('ZerAds300');
                        if (zeradsElement) {
                            // एलिमेंट को क्लोन करके नए कंटेनर में डालें, क्योंकि एक एलिमेंट एक ही जगह हो सकता है
                            const clonedAd = zeradsElement.cloneNode(true);
                            clonedAd.style.display = 'none'; // छुपा रहेगा, loadZerAds इसे दिखाएगा
                            container.appendChild(clonedAd);
                            
                            // एड लोड करें (सुनिश्चित करें कि यह नए क्लोन के लिए भी चले)
                            // थोड़ा इंतजार करके लोड करें ताकि DOM तैयार हो जाए
                            setTimeout(() => {
                                loadZerAdsForElement(clonedAd);
                            }, 100);
                        }
                    }
                });
            }

            // एस्केप HTML
            function escapeHtml(unsafe) {
                if (!unsafe) return unsafe;
                return unsafe.replace(/[&<>"]/g, function(m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    if (m === '"') return '&quot;';
                    return m;
                });
            }

            function updateTicker() {
                if (!tickerTextDiv) return;
                const h1List = posts.map(p => p.h1).filter(h => h);
                if (h1List.length === 0) {
                    tickerTextDiv.innerHTML = '<span>ताज़ा खबर</span> लखनऊ समाचार 🔥 <span>न्यूज़</span>';
                    return;
                }
                const tickerContent = h1List.map(title => `${title} <span>✹ NEWS</span>`).join('  🔴  ');
                tickerTextDiv.innerHTML = tickerContent + '  🔴  ' + tickerContent;
            }

            function updateLiveTime() {
                const now = new Date();
                const options = { weekday: 'short', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit', second:'2-digit' };
                const timeStr = now.toLocaleString('hi-IN', options);
                if (liveClockSpan) liveClockSpan.innerText = timeStr;
            }
            setInterval(updateLiveTime, 1000);
            updateLiveTime();

            // एडमिन लॉगिन
            adminLoginBtn.addEventListener('click', function() {
                const pwd = prompt('एडमिन पासवर्ड डालें (123)');
                if (pwd === '123') {
                    adminOverlay.style.display = 'flex';
                } else {
                    alert('गलत पासवर्ड! केवल 123 स्वीकार्य है।');
                }
            });

            closeAdminBtn.addEventListener('click', function() {
                adminOverlay.style.display = 'none';
            });

            adminOverlay.addEventListener('click', function(e) {
                if (e.target === adminOverlay) adminOverlay.style.display = 'none';
            });

            // पोस्ट प्रकाशित करें
            publishBtn.addEventListener('click', function() {
                const h1 = postH1.value.trim();
                const h2 = postH2.value.trim();
                const file = postImageInput.files[0];
                
                if (!h1) {
                    alert('कृपया कम से कम H1 शीर्षक डालें');
                    return;
                }

                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const imageData = e.target.result;
                        addNewPost(h1, h2, imageData);
                    };
                    reader.readAsDataURL(file);
                } else {
                    addNewPost(h1, h2, null);
                }
            });

            function addNewPost(h1, h2, imageData) {
                const newPost = {
                    h1: h1,
                    h2: h2 || '',
                    image: imageData || '',
                    date: new Date().toLocaleString('hi-IN', { year:'numeric', month:'long', day:'numeric', hour:'2-digit', minute:'2-digit' }),
                    desc: postDesc.value.trim() || ''
                };
                posts.push(newPost);
                localStorage.setItem('snews_posts', JSON.stringify(posts));
                
                postH1.value = ''; 
                postH2.value = ''; 
                postImageInput.value = ''; 
                postDesc.value = '';
                adminOverlay.style.display = 'none';
                
                renderPosts(); // री-रेंडर करें
                updateTicker();
            }

            // शुरू में पोस्ट रेंडर करें
            renderPosts();
            updateTicker();
        })();
    </script>
</body>
</html>
