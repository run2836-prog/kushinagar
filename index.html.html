<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kushinagar News - Your Local News Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
        }

        /* Header Styles */
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 1rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .logo {
            font-size: 2rem;
            font-weight: bold;
            background: linear-gradient(135deg, #fff 0%, #f0f0f0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        nav {
            display: flex;
            gap: 2rem;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            padding: 0.5rem 1rem;
            border-radius: 5px;
        }

        nav a:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }

        /* Grid Container */
        .grid-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }

        .grid-item {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .grid-item:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 30px rgba(0,0,0,0.2);
        }

        .grid-image {
            width: 100%;
            height: 200px;
            overflow: hidden;
            background: #f0f0f0;
        }

        .grid-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: all 0.5s ease;
        }

        .grid-item:hover .grid-image img {
            transform: scale(1.1);
        }

        .grid-content {
            padding: 1.5rem;
        }

        .grid-title {
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
            color: #333;
            font-weight: bold;
        }

        .grid-description {
            color: #666;
            line-height: 1.6;
            font-size: 0.95rem;
        }

        /* Pagination */
        .pagination {
            max-width: 1200px;
            margin: 2rem auto;
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .page-btn {
            padding: 0.5rem 1rem;
            background: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        .page-btn:hover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transform: translateY(-2px);
        }

        .page-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        /* Admin Button */
        .admin-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 1rem 2rem;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .admin-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        /* Admin Panel */
        .admin-panel {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            z-index: 2000;
            overflow-y: auto;
        }

        .admin-panel.active {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .admin-content {
            background: white;
            width: 90%;
            max-width: 800px;
            border-radius: 15px;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .login-form {
            text-align: center;
        }

        .login-form input {
            width: 100%;
            padding: 1rem;
            margin: 1rem 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
        }

        .login-form button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 1rem 2rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .login-form button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        /* Admin Dashboard */
        .admin-dashboard {
            display: none;
        }

        .admin-dashboard.active {
            display: block;
        }

        .post-form input, .post-form textarea, .post-form select {
            width: 100%;
            padding: 0.8rem;
            margin: 0.5rem 0;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .post-form textarea {
            min-height: 100px;
            resize: vertical;
        }

        .post-form button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 0.5rem;
            transition: all 0.3s ease;
        }

        .post-form button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .post-list {
            margin-top: 2rem;
            max-height: 300px;
            overflow-y: auto;
        }

        .post-item {
            background: #f8f9fa;
            padding: 1rem;
            margin: 0.5rem 0;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .post-item button {
            background: #dc3545;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 3px;
            cursor: pointer;
        }

        .ad-settings {
            margin-top: 2rem;
            border-top: 2px solid #eee;
            padding-top: 2rem;
        }

        .ad-input {
            margin: 1rem 0;
        }

        .ad-input label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }

        .ad-input textarea {
            width: 100%;
            min-height: 100px;
            padding: 1rem;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-family: monospace;
        }

        /* Footer */
        footer {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            padding: 1rem;
            margin-top: 3rem;
        }

        .page-content {
            max-width: 800px;
            margin: 2rem auto;
            padding: 2rem;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .post-page {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 2rem;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .featured-image {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: 10px;
            margin: 1rem 0;
        }

        .ad-container {
            margin: 2rem 0;
            padding: 1rem;
            background: #f8f9fa;
            border-radius: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo">Kushinagar Times</div>
            <nav>
                <a href="#" onclick="loadPage('home')">Home</a>
                <a href="#" onclick="loadPage('about')">About Us</a>
                <a href="#" onclick="loadPage('contact')">Contact Us</a>
                <a href="#" onclick="loadPage('privacy')">Privacy Policy</a>
            </nav>
        </div>
    </header>

    <main id="main-content">
        <div class="grid-container" id="post-grid"></div>
        <div class="pagination" id="pagination"></div>
    </main>

    <footer>
        <p>Copyright © 2026 – Kushinagar. All rights reserved.</p>
    </footer>

    <button class="admin-btn" onclick="openAdminPanel()">⚙️ Admin Panel</button>

    <div class="admin-panel" id="admin-panel">
        <div class="admin-content">
            <div class="login-form" id="login-form">
                <h2>Admin Login</h2>
                <input type="password" id="password" placeholder="Enter Password">
                <button onclick="checkPassword()">Login</button>
            </div>

            <div class="admin-dashboard" id="admin-dashboard">
                <h2>Admin Dashboard</h2>
                <button onclick="closeAdminPanel()" style="float: right; background: #dc3545;">Close</button>
                
                <div class="post-form">
                    <h3>Create New Post</h3>
                    <input type="text" id="post-title" placeholder="Post Title (Keyword)">
                    <textarea id="post-description" placeholder="Post Description (at least 100 words)"></textarea>
                    <input type="url" id="post-image" placeholder="Image URL">
                    <button onclick="createPost()">Publish Post</button>
                </div>

                <div class="post-list" id="post-list">
                    <h3>Existing Posts</h3>
                </div>

                <div class="ad-settings">
                    <h3>Ad Settings</h3>
                    <div class="ad-input">
                        <label>Head Section Code</label>
                        <textarea id="head-code" placeholder="<script> or <style> code for head section"></textarea>
                    </div>
                    <div class="ad-input">
                        <label>Body Section Code</label>
                        <textarea id="body-code" placeholder="Ad codes for body section"></textarea>
                    </div>
                    <button onclick="saveAdSettings()">Save Ad Settings</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Data storage
        let posts = JSON.parse(localStorage.getItem('posts')) || [];
        let adSettings = JSON.parse(localStorage.getItem('adSettings')) || {
            head: '',
            body: ''
        };
        let currentPage = 1;
        const postsPerPage = 10;

        // Sample data initialization
        if (posts.length === 0) {
            for (let i = 1; i <= 20; i++) {
                posts.push({
                    id: Date.now() + i,
                    title: `Sample Post ${i}`,
                    description: `This is a detailed sample post number ${i}. It contains more than 100 words to demonstrate the content structure. Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat. Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur. Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia deserunt mollit anim id est laborum.`,
                    image: `https://picsum.photos/400/300?random=${i}`,
                    date: new Date().toLocaleDateString()
                });
            }
            localStorage.setItem('posts', JSON.stringify(posts));
        }

        // Initialize ad settings
        if (!localStorage.getItem('adSettings')) {
            localStorage.setItem('adSettings', JSON.stringify(adSettings));
        }

        function loadPage(page) {
            const mainContent = document.getElementById('main-content');
            
            if (page === 'home') {
                displayPosts();
            } else {
                let content = '';
                switch(page) {
                    case 'about':
                        content = `
                            <div class="page-content">
                                <h1>About Us</h1>
                                <p>Welcome to Kushinagar Times, your premier source for local news and updates from the historic city of Kushinagar. Our mission is to provide accurate, timely, and relevant information to the residents and visitors of this sacred land where Lord Buddha attained Mahaparinirvana.</p>
                                <p>Founded in 2024, we have grown to become the most trusted voice in Kushinagar, covering everything from local events and cultural celebrations to important announcements and community developments. Our team of dedicated journalists works tirelessly to bring you stories that matter, with integrity and professionalism.</p>
                                <p>Kushinagar, being one of the most important Buddhist pilgrimage sites, attracts visitors from all over the world. We take pride in showcasing the spiritual heritage, cultural richness, and modern developments of our beloved city. From the ancient ruins and stupas to the growing infrastructure and tourism facilities, we cover it all.</p>
                                <p>Our commitment to excellence in journalism and community service drives us to continuously improve and expand our coverage. We believe in the power of information to bring people together and create positive change in society.</p>
                                <p>Thank you for being part of our journey. Together, we're building a more informed and connected Kushinagar community.</p>
                            </div>
                        `;
                        break;
                    case 'contact':
                        content = `
                            <div class="page-content">
                                <h1>Contact Us</h1>
                                <p>We'd love to hear from you! Whether you have a news tip, feedback about our coverage, or just want to say hello, here's how you can reach us:</p>
                                <h3>Office Address:</h3>
                                <p>Kushinagar Times<br>
                                Main Road, Near Buddha Temple<br>
                                Kushinagar, Uttar Pradesh - 274403<br>
                                India</p>
                                <h3>Phone Numbers:</h3>
                                <p>Editorial Desk: +91 12345 67890<br>
                                Advertising: +91 09876 54321<br>
                                Customer Support: +91 11223 44556</p>
                                <h3>Email:</h3>
                                <p>General Inquiries: info@kushinagartimes.com<br>
                                News Tips: news@kushinagartimes.com<br>
                Advertising: ads@kushinagartimes.com</p>
                                <h3>Office Hours:</h3>
                                <p>Monday - Friday: 9:00 AM to 6:00 PM<br>
                                Saturday: 10:00 AM to 2:00 PM<br>
                                Sunday: Closed</p>
                            </div>
                        `;
                        break;
                    case 'privacy':
                        content = `
                            <div class="page-content">
                                <h1>Privacy Policy</h1>
                                <p>At Kushinagar Times, accessible from www.kushinagartimes.com, one of our main priorities is the privacy of our visitors. This Privacy Policy document contains types of information that is collected and recorded by Kushinagar Times and how we use it.</p>
                                <h3>Log Files</h3>
                                <p>Kushinagar Times follows a standard procedure of using log files. These files log visitors when they visit websites. All hosting companies do this and a part of hosting services' analytics. The information collected by log files include internet protocol (IP) addresses, browser type, Internet Service Provider (ISP), date and time stamp, referring/exit pages, and possibly the number of clicks. These are not linked to any information that is personally identifiable. The purpose of the information is for analyzing trends, administering the site, tracking users' movement on the website, and gathering demographic information.</p>
                                <h3>Cookies and Web Beacons</h3>
                                <p>Like any other website, Kushinagar Times uses 'cookies'. These cookies are used to store information including visitors' preferences, and the pages on the website that the visitor accessed or visited. The information is used to optimize the users' experience by customizing our web page content based on visitors' browser type and/or other information.</p>
                                <h3>Privacy Policies</h3>
                                <p>You may consult this list to find the Privacy Policy for each of the advertising partners of Kushinagar Times.</p>
                                <p>Third-party ad servers or ad networks uses technologies like cookies, JavaScript, or Web Beacons that are used in their respective advertisements and links that appear on Kushinagar Times, which are sent directly to users' browser. They automatically receive your IP address when this occurs. These technologies are used to measure the effectiveness of their advertising campaigns and/or to personalize the advertising content that you see on websites that you visit.</p>
                                <p>Note that Kushinagar Times has no access to or control over these cookies that are used by third-party advertisers.</p>
                                <h3>Consent</h3>
                                <p>By using our website, you hereby consent to our Privacy Policy and agree to its Terms and Conditions.</p>
                            </div>
                        `;
                        break;
                }
                mainContent.innerHTML = content;
            }
        }

        function displayPosts() {
            const gridContainer = document.getElementById('post-grid');
            const paginationDiv = document.getElementById('pagination');
            
            const startIndex = (currentPage - 1) * postsPerPage;
            const endIndex = startIndex + postsPerPage;
            const currentPosts = posts.slice(startIndex, endIndex);
            
            let html = '';
            currentPosts.forEach(post => {
                html += `
                    <a href="#" class="grid-item" onclick="viewPost(${post.id}); return false;">
                        <div class="grid-image">
                            <img src="${post.image}" alt="${post.title}">
                        </div>
                        <div class="grid-content">
                            <h3 class="grid-title">${post.title}</h3>
                            <p class="grid-description">${post.description.substring(0, 100)}...</p>
                            <small>${post.date}</small>
                        </div>
                    </a>
                `;
            });
            
            gridContainer.innerHTML = html;
            
            // Create pagination
            const totalPages = Math.ceil(posts.length / postsPerPage);
            let paginationHtml = '';
            for (let i = 1; i <= totalPages; i++) {
                paginationHtml += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
            }
            paginationDiv.innerHTML = paginationHtml;
            
            // Add body ads if any
            if (adSettings.body) {
                const adContainer = document.createElement('div');
                adContainer.className = 'ad-container';
                adContainer.innerHTML = adSettings.body;
                gridContainer.parentNode.insertBefore(adContainer, gridContainer);
            }
        }

        function changePage(page) {
            currentPage = page;
            displayPosts();
        }

        function viewPost(postId) {
            const post = posts.find(p => p.id === postId);
            const mainContent = document.getElementById('main-content');
            
            let html = `
                <div class="post-page">
                    <h1>${post.title}</h1>
                    <img src="${post.image}" alt="${post.title}" class="featured-image">
                    <div class="post-date">Published: ${post.date}</div>
                    <div class="post-content">
                        <p>${post.description}</p>
                    </div>
            `;
            
            // Add ads if any
            if (adSettings.body) {
                html += `<div class="ad-container">${adSettings.body}</div>`;
            }
            
            html += `<button onclick="displayPosts()" style="padding: 1rem 2rem; margin: 1rem 0; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 5px; cursor: pointer;">← Back to Home</button></div>`;
            
            mainContent.innerHTML = html;
            
            // Update URL without reload
            history.pushState({}, '', `?post=${postId}`);
        }

        function openAdminPanel() {
            document.getElementById('admin-panel').classList.add('active');
        }

        function closeAdminPanel() {
            document.getElementById('admin-panel').classList.remove('active');
            document.getElementById('login-form').style.display = 'block';
            document.getElementById('admin-dashboard').classList.remove('active');
        }

        function checkPassword() {
            const password = document.getElementById('password').value;
            if (password === '123') {
                document.getElementById('login-form').style.display = 'none';
                document.getElementById('admin-dashboard').classList.add('active');
                updatePostList();
                // Load ad settings
                document.getElementById('head-code').value = adSettings.head;
                document.getElementById('body-code').value = adSettings.body;
            } else {
                alert('Wrong password!');
            }
        }

        function createPost() {
            const title = document.getElementById('post-title').value;
            const description = document.getElementById('post-description').value;
            const image = document.getElementById('post-image').value || 'https://picsum.photos/400/300?random=' + Date.now();
            
            if (title && description) {
                const newPost = {
                    id: Date.now(),
                    title: title,
                    description: description,
                    image: image,
                    date: new Date().toLocaleDateString()
                };
                
                posts.unshift(newPost);
                localStorage.setItem('posts', JSON.stringify(posts));
                
                // Clear form
                document.getElementById('post-title').value = '';
                document.getElementById('post-description').value = '';
                document.getElementById('post-image').value = '';
                
                updatePostList();
                displayPosts();
                alert('Post created successfully!');
            } else {
                alert('Please fill in all required fields!');
            }
        }

        function deletePost(id) {
            if (confirm('Are you sure you want to delete this post?')) {
                posts = posts.filter(post => post.id !== id);
                localStorage.setItem('posts', JSON.stringify(posts));
                updatePostList();
                displayPosts();
            }
        }

        function updatePostList() {
            const postList = document.getElementById('post-list');
            let html = '<h3>Existing Posts</h3>';
            
            posts.forEach(post => {
                html += `
                    <div class="post-item">
                        <span>${post.title} (${post.date})</span>
                        <button onclick="deletePost(${post.id})">Delete</button>
                    </div>
                `;
            });
            
            postList.innerHTML = html;
        }

        function saveAdSettings() {
            adSettings = {
                head: document.getElementById('head-code').value,
                body: document.getElementById('body-code').value
            };
            localStorage.setItem('adSettings', JSON.stringify(adSettings));
            
            // Add head code to document
            let headScript = document.getElementById('ad-head-script');
            if (!headScript) {
                headScript = document.createElement('div');
                headScript.id = 'ad-head-script';
                document.head.appendChild(headScript);
            }
            headScript.innerHTML = adSettings.head;
            
            alert('Ad settings saved successfully!');
        }

        // Initialize the page
        document.addEventListener('DOMContentLoaded', function() {
            displayPosts();
            
            // Check if viewing a specific post
            const urlParams = new URLSearchParams(window.location.search);
            const postId = urlParams.get('post');
            if (postId) {
                viewPost(parseInt(postId));
            }
            
            // Load head ads
            if (adSettings.head) {
                const headScript = document.createElement('div');
                headScript.id = 'ad-head-script';
                headScript.innerHTML = adSettings.head;
                document.head.appendChild(headScript);
            }
        });
    </script>
</body>
</html>
