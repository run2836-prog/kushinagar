<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3‑second auto‑click · new tab (fixed)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: default;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #e9eef3 0%, #dbe1e8 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            position: relative;
            overflow: hidden;
        }

        /* main ad card */
        .ad-container {
            width: 250px;
            height: 250px;
            background: linear-gradient(135deg, #ff512f, #dd2476);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            color: white;
            text-align: center;
            padding: 15px;
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
            z-index: 10;
        }

        .ad-title {
            font-size: 20px;
            font-weight: bold;
            margin-top: 10px;
        }

        .ad-text {
            font-size: 14px;
            margin: 15px 0;
            line-height: 1.5;
        }

        .ad-btn {
            display: inline-block;
            padding: 10px 18px;
            background: white;
            color: #dd2476;
            font-weight: bold;
            border-radius: 20px;
            text-decoration: none;
            transition: 0.2s;
            border: none;
            cursor: pointer;
            font-size: 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            pointer-events: auto;  /* ensure clickable */
        }

        .ad-btn:hover {
            background: #ffe3ec;
            transform: scale(1.05);
        }

        .close-btn {
            position: absolute;
            top: 5px;
            right: 8px;
            font-size: 14px;
            cursor: pointer;
            color: white;
            z-index: 15;
            background: rgba(0,0,0,0.1);
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .close-btn:hover {
            background: rgba(255,255,255,0.25);
        }

        .circle {
            position: absolute;
            width: 120px;
            height: 120px;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
            top: -30px;
            left: -30px;
            pointer-events: none;
        }

        /* floating mouse cursor */
        .auto-cursor {
            position: fixed;
            width: 22px;
            height: 22px;
            pointer-events: none;
            z-index: 9999;
            filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.3));
            transition: left 0.05s linear, top 0.05s linear;
            will-change: left, top;
        }

        .auto-cursor svg {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* click flash effect */
        .click-flash {
            position: fixed;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.75);
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 10000;
            box-shadow: 0 0 20px rgba(255,255,255,0.8);
            opacity: 0;
            animation: flashRipple 0.3s ease-out forwards;
        }

        @keyframes flashRipple {
            0% { width: 18px; height: 18px; opacity: 0.7; background: rgba(255,255,200,0.9); }
            100% { width: 70px; height: 70px; opacity: 0; background: rgba(255,180,180,0); }
        }

        /* countdown note */
        .countdown-note {
            position: fixed;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20,20,20,0.7);
            backdrop-filter: blur(3px);
            color: #ffefd0;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid rgba(255,215,140,0.5);
            z-index: 9998;
            pointer-events: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .countdown-note span {
            font-weight: bold;
            color: #ffb87c;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <!-- main ad card - using a real URL that opens in new tab -->
    <div class="ad-container" id="adBox">
        <div class="circle"></div>
        <div class="close-btn" onclick="closeAd()">✖</div>        
        <div class="ad-title">🔥 Special Offer</div>
        <div class="ad-text">
            Learn HTML, CSS & JavaScript <br>
            Start Your Coding Journey Today!
        </div>        
        <!-- Using a real website URL that definitely opens -->
        <a href="https://www.google.com" target="_blank" rel="noopener noreferrer" class="ad-btn" id="enrollBtn">Enroll Now</a>
    </div>

    <!-- floating mouse cursor -->
    <div class="auto-cursor" id="fakeCursor">
        <svg viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M2,2 L20,2 L20,18 L15,18 L11,24 L7,18 L2,18 Z" fill="white" stroke="black" stroke-width="1.5" stroke-linejoin="round"/>
            <path d="M7,18 L11,24 L15,18" fill="#f0f0f0" stroke="black" stroke-width="1.2" stroke-linejoin="round"/>
        </svg>
    </div>

    <!-- countdown display -->
    <div class="countdown-note" id="countdownDisplay">
        ⏳ auto‑click in <span id="timerSec">3</span>s
    </div>

    <script>
        (function() {
            "use strict";

            // DOM elements
            const adBox = document.getElementById('adBox');
            const enrollBtn = document.getElementById('enrollBtn');
            const fakeCursor = document.getElementById('fakeCursor');
            const timerSpan = document.getElementById('timerSec');

            // closeAd function
            window.closeAd = function() {
                adBox.style.display = 'none';
            };

            // get button center coordinates
            function getButtonCenter() {
                const rect = enrollBtn.getBoundingClientRect();
                return {
                    x: rect.left + rect.width / 2,
                    y: rect.top + rect.height / 2
                };
            }

            // FIXED: perform auto-click that DEFINITELY opens new tab
            function performAutoClick() {
                // Get button center for visual effects
                const center = getButtonCenter();
                
                // 1) Visual flash effect
                const flash = document.createElement('div');
                flash.className = 'click-flash';
                flash.style.left = center.x + 'px';
                flash.style.top = center.y + 'px';
                document.body.appendChild(flash);
                setTimeout(() => { flash.remove(); }, 300);

                // 2) Cursor scale effect
                fakeCursor.style.transition = 'transform 0.08s';
                fakeCursor.style.transform = 'scale(1.2)';
                setTimeout(() => {
                    fakeCursor.style.transform = 'scale(1)';
                    setTimeout(() => { 
                        fakeCursor.style.transition = ''; 
                    }, 100);
                }, 80);

                // 3) CRITICAL FIX: Create and dispatch a REAL mouse click event
                //    This properly simulates a real user click with all coordinates
                const clickEvent = new MouseEvent('click', {
                    view: window,
                    bubbles: true,
                    cancelable: true,
                    clientX: center.x,
                    clientY: center.y,
                    screenX: center.x + window.screenX,
                    screenY: center.y + window.screenY,
                    button: 0,        // left button
                    buttons: 1         // left button pressed
                });
                
                // Dispatch the event on the button
                enrollBtn.dispatchEvent(clickEvent);
                
                // 4) Backup method: directly open the URL in new tab
                //    This ensures it opens even if event dispatch fails
                setTimeout(() => {
                    const href = enrollBtn.getAttribute('href');
                    if (href && href !== '#') {
                        window.open(href, '_blank');
                    }
                }, 50); // Small delay to not interfere with event

                // 5) Update countdown display
                if (countdownInterval) clearInterval(countdownInterval);
                const note = document.querySelector('.countdown-note');
                if (note) note.innerHTML = '✓ opened in new tab!';
                
                // Stop cursor animation
                if (animationFrame) cancelAnimationFrame(animationFrame);
            }

            // Smooth cursor animation
            function startCursorAnimation() {
                const startX = 50, startY = 120;
                const target = getButtonCenter();
                let targetX = target.x;
                let targetY = target.y;

                fakeCursor.style.left = startX + 'px';
                fakeCursor.style.top = startY + 'px';

                const startTimestamp = performance.now();
                const DURATION = 700;

                function animate(now) {
                    const elapsed = now - startTimestamp;
                    let progress = Math.min(elapsed / DURATION, 1);
                    const eased = 1 - Math.pow(1 - progress, 3);

                    const currentX = startX + (targetX - startX) * eased;
                    const currentY = startY + (targetY - startY) * eased;

                    fakeCursor.style.left = currentX + 'px';
                    fakeCursor.style.top = currentY + 'px';

                    if (progress < 1) {
                        animationFrame = requestAnimationFrame(animate);
                    } else {
                        fakeCursor.style.left = targetX + 'px';
                        fakeCursor.style.top = targetY + 'px';
                    }
                }

                animationFrame = requestAnimationFrame(animate);
            }

            // Countdown
            let countdownInterval;
            function startCountdown(seconds) {
                let remaining = seconds;
                timerSpan.innerText = remaining;
                countdownInterval = setInterval(() => {
                    remaining -= 1;
                    if (remaining >= 0) timerSpan.innerText = remaining;
                    if (remaining <= 0) {
                        clearInterval(countdownInterval);
                        countdownInterval = null;
                    }
                }, 1000);
            }

            // Start everything
            window.addEventListener('load', function() {
                setTimeout(() => {
                    startCursorAnimation();
                    startCountdown(3);

                    // Auto-click after exactly 3 seconds
                    setTimeout(() => {
                        performAutoClick();
                    }, 3000);

                }, 100);
            });

        })();
    </script>
</body>
</html>
