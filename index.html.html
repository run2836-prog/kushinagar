<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3s auto‑click · real mouse physics</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: default;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #e9eef3 0%, #dbe1e8 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            position: relative;
            overflow: hidden;
        }

        /* main ad card */
        .ad-container {
            width: 250px;
            height: 250px;
            background: linear-gradient(135deg, #ff512f, #dd2476);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            color: white;
            text-align: center;
            padding: 15px;
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
            z-index: 10;
        }

        .ad-title {
            font-size: 20px;
            font-weight: bold;
            margin-top: 10px;
        }

        .ad-text {
            font-size: 14px;
            margin: 15px 0;
            line-height: 1.5;
        }

        .ad-btn {
            display: inline-block;
            padding: 10px 18px;
            background: white;
            color: #dd2476;
            font-weight: bold;
            border-radius: 20px;
            text-decoration: none;
            transition: 0.2s;
            border: none;
            cursor: pointer;
            font-size: 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            pointer-events: auto;
        }

        .ad-btn:hover {
            background: #ffe3ec;
            transform: scale(1.05);
        }

        .close-btn {
            position: absolute;
            top: 5px;
            right: 8px;
            font-size: 14px;
            cursor: pointer;
            color: white;
            z-index: 15;
            background: rgba(0,0,0,0.1);
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .close-btn:hover {
            background: rgba(255,255,255,0.25);
        }

        .circle {
            position: absolute;
            width: 120px;
            height: 120px;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
            top: -30px;
            left: -30px;
            pointer-events: none;
        }

        /* ---------- REAL MOUSE CURSOR (physics based) ---------- */
        .auto-cursor {
            position: fixed;
            width: 22px;
            height: 22px;
            pointer-events: none;
            z-index: 9999;
            filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.3));
            /* no transition – we control via JS for organic movement */
            will-change: left, top;
        }

        .auto-cursor svg {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* click flash */
        .click-flash {
            position: fixed;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.75);
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 10000;
            box-shadow: 0 0 20px rgba(255,255,255,0.8);
            opacity: 0;
            animation: flashRipple 0.3s ease-out forwards;
        }

        @keyframes flashRipple {
            0% { width: 18px; height: 18px; opacity: 0.7; background: rgba(255,255,200,0.9); }
            100% { width: 70px; height: 70px; opacity: 0; background: rgba(255,180,180,0); }
        }

        /* countdown */
        .countdown-note {
            position: fixed;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20,20,20,0.7);
            backdrop-filter: blur(3px);
            color: #ffefd0;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid rgba(255,215,140,0.5);
            z-index: 9998;
            pointer-events: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .countdown-note span {
            font-weight: bold;
            color: #ffb87c;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <!-- ad card – with real URL -->
    <div class="ad-container" id="adBox">
        <div class="circle"></div>
        <div class="close-btn" onclick="closeAd()">✖</div>        
        <div class="ad-title">🔥 Special Offer</div>
        <div class="ad-text">
            Learn HTML, CSS & JavaScript <br>
            Start Your Coding Journey Today!
        </div>        
        <a href="https://www.google.com" target="_blank" rel="noopener noreferrer" class="ad-btn" id="enrollBtn">Enroll Now</a>
    </div>

    <!-- real‑mouse cursor (SVG) -->
    <div class="auto-cursor" id="fakeCursor">
        <svg viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M2,2 L20,2 L20,18 L15,18 L11,24 L7,18 L2,18 Z" fill="white" stroke="black" stroke-width="1.5" stroke-linejoin="round"/>
            <path d="M7,18 L11,24 L15,18" fill="#f0f0f0" stroke="black" stroke-width="1.2" stroke-linejoin="round"/>
        </svg>
    </div>

    <!-- countdown display -->
    <div class="countdown-note" id="countdownDisplay">
        ⏳ auto‑click in <span id="timerSec">3</span>s
    </div>

    <script>
        (function() {
            "use strict";

            // --- elements ---
            const adBox = document.getElementById('adBox');
            const enrollBtn = document.getElementById('enrollBtn');
            const fakeCursor = document.getElementById('fakeCursor');
            const timerSpan = document.getElementById('timerSec');

            window.closeAd = function() {
                adBox.style.display = 'none';
            };

            // get current button center (constantly updated)
            function getButtonCenter() {
                const rect = enrollBtn.getBoundingClientRect();
                return {
                    x: rect.left + rect.width / 2,
                    y: rect.top + rect.height / 2
                };
            }

            // ---------- REAL MOUSE MOVEMENT (with inertia & micro‑corrections) ----------
            let animationFrame = null;
            let startTime = null;
            const DURATION = 900; // slightly longer for more natural feel (0.9 sec)

            // starting point (top-left area, like user just moved there)
            const START = { x: 40, y: 80 };

            // target updates on each frame in case of resize, but we fix initial target
            let target = getButtonCenter();

            function mousePhysicsAnim(now) {
                if (!startTime) startTime = now;
                const elapsed = now - startTime;
                let progress = Math.min(elapsed / DURATION, 1);

                // ---------- REAL MOUSE TRAJECTORY ----------
                // 1. smooth start (barely moves first 5%), then acceleration,
                //    slight overshoot (105%) and finally micro‑correction to target.
                //    This mimics real hand: quick move + tiny corrective glide.
                
                // base ease: cubic-out (fast then slow) – but we add overshoot
                let eased = 1 - Math.pow(1 - progress, 3.5); // stronger curve
                
                // overshoot only in last 30% (to mimic fine adjustment)
                let overshoot = 0;
                if (progress > 0.7) {
                    // small overshoot (max 5% extra) that resolves to 0 at progress=1
                    const overshootFactor = Math.sin((progress - 0.7) / 0.3 * Math.PI) * 0.05;
                    overshoot = overshootFactor * (1 - progress); // dampen at end
                }
                
                // apply overshoot to progress (simulate passing target then coming back)
                let adjustedProgress = Math.min(eased + overshoot, 1.02); // cap slightly
                
                // final mapping: if adjustedProgress > 1, we go beyond target, then correct
                let currentX, currentY;
                if (adjustedProgress <= 1.0) {
                    // normal move toward target
                    currentX = START.x + (target.x - START.x) * adjustedProgress;
                    currentY = START.y + (target.y - START.y) * adjustedProgress;
                } else {
                    // overshoot phase – go slightly beyond target, then back
                    const overshootAmount = (adjustedProgress - 1.0) * 8; // max 0.16 excess (16% of distance)
                    const directionX = target.x - START.x;
                    const directionY = target.y - START.y;
                    
                    // beyond target
                    currentX = target.x + directionX * overshootAmount * 0.15;
                    currentY = target.y + directionY * overshootAmount * 0.15;
                    
                    // but if we are at the very end (progress=1), we force target
                    if (progress >= 0.99) {
                        currentX = target.x;
                        currentY = target.y;
                    }
                }

                // apply position
                fakeCursor.style.left = currentX + 'px';
                fakeCursor.style.top = currentY + 'px';

                if (progress < 1) {
                    animationFrame = requestAnimationFrame(mousePhysicsAnim);
                } else {
                    // final snap to exact button center (smooth landing)
                    fakeCursor.style.left = target.x + 'px';
                    fakeCursor.style.top = target.y + 'px';
                }
            }

            // start the real‑mouse animation
            function startRealMouseMove() {
                // reset startTime
                startTime = null;
                // get fresh target (button may have moved due to layout)
                target = getButtonCenter();
                // set initial cursor position
                fakeCursor.style.left = START.x + 'px';
                fakeCursor.style.top = START.y + 'px';
                // launch animation
                animationFrame = requestAnimationFrame(mousePhysicsAnim);
            }

            // ---------- AUTO CLICK (new tab guaranteed) ----------
            function performAutoClick() {
                // get latest button center for flash
                const center = getButtonCenter();
                
                // 1) flash ripple
                const flash = document.createElement('div');
                flash.className = 'click-flash';
                flash.style.left = center.x + 'px';
                flash.style.top = center.y + 'px';
                document.body.appendChild(flash);
                setTimeout(() => { flash.remove(); }, 300);

                // 2) cursor press effect (like micro‑tap)
                fakeCursor.style.transition = 'transform 0.06s';
                fakeCursor.style.transform = 'scale(1.15)';
                setTimeout(() => {
                    fakeCursor.style.transform = 'scale(1)';
                    setTimeout(() => { fakeCursor.style.transition = ''; }, 80);
                }, 70);

                // 3) PRIMARY METHOD: dispatch REAL mouse click with full coordinates
                const clickEvent = new MouseEvent('click', {
                    view: window,
                    bubbles: true,
                    cancelable: true,
                    clientX: center.x,
                    clientY: center.y,
                    screenX: center.x + (window.screenX || 0),
                    screenY: center.y + (window.screenY || 0),
                    button: 0,
                    buttons: 1
                });
                enrollBtn.dispatchEvent(clickEvent);

                // 4) BACKUP: force open new tab (100% reliable)
                setTimeout(() => {
                    const href = enrollBtn.getAttribute('href');
                    if (href && href !== '#') {
                        window.open(href, '_blank');
                    }
                }, 60);

                // 5) update countdown
                if (countdownInterval) clearInterval(countdownInterval);
                const note = document.querySelector('.countdown-note');
                if (note) note.innerHTML = '✓ opened in new tab!';
                
                if (animationFrame) cancelAnimationFrame(animationFrame);
            }

            // countdown
            let countdownInterval;
            function startCountdown(seconds) {
                let remaining = seconds;
                timerSpan.innerText = remaining;
                countdownInterval = setInterval(() => {
                    remaining -= 1;
                    if (remaining >= 0) timerSpan.innerText = remaining;
                    if (remaining <= 0) {
                        clearInterval(countdownInterval);
                        countdownInterval = null;
                    }
                }, 1000);
            }

            // start everything after load
            window.addEventListener('load', function() {
                setTimeout(() => {
                    startRealMouseMove();       // cursor moves like real mouse
                    startCountdown(3);

                    setTimeout(() => {
                        performAutoClick();      // click after 3s
                    }, 3000);

                }, 100);
            });

        })();
    </script>
</body>
</html>
