<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto‑click ad · real mouse effect</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: default; /* will be overridden on the button */
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #1e2b3a;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            position: relative;
        }

        /* ad card – clean & modern */
        .ad-container {
            width: 280px;
            height: 300px;
            background: linear-gradient(145deg, #1e2b3a, #0f1a24);
            border-radius: 28px;
            box-shadow: 0 20px 35px -8px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 215, 0, 0.2) inset;
            color: white;
            text-align: center;
            padding: 24px 16px 20px;
            box-sizing: border-box;
            position: relative;
            overflow: visible;
            transition: transform 0.15s;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        /* decorative glowing orb */
        .ad-container::before {
            content: '';
            position: absolute;
            width: 180px;
            height: 180px;
            background: radial-gradient(circle at 30% 30%, rgba(255, 200, 50, 0.25), transparent 70%);
            border-radius: 50%;
            top: -40px;
            left: -40px;
            z-index: 0;
            pointer-events: none;
        }

        .ad-title {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 0.5px;
            background: linear-gradient(120deg, #ffe68f, #ffd966);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-top: 8px;
            position: relative;
            z-index: 2;
        }

        .ad-text {
            font-size: 15px;
            margin: 18px 0 20px;
            line-height: 1.5;
            color: #cfddee;
            font-weight: 400;
            position: relative;
            z-index: 2;
            padding: 0 6px;
        }

        /* button – exactly the click target */
        .ad-btn {
            display: inline-block;
            padding: 12px 28px;
            background: #ffd966;
            color: #0b1a2a;
            font-weight: 700;
            font-size: 17px;
            border-radius: 40px;
            text-decoration: none;
            transition: all 0.2s ease;
            box-shadow: 0 8px 0 #b57c1a, 0 10px 20px -5px black;
            border: 1px solid #fce49b;
            position: relative;
            z-index: 10;  /* ensure clickable */
            cursor: pointer;  /* default pointer, will be forced by JS too */
            letter-spacing: 0.4px;
        }

        /* subtle hover effect – we keep it because human may hover */
        .ad-btn:hover {
            background: #ffe289;
            transform: translateY(-2px);
            box-shadow: 0 10px 0 #b57c1a, 0 15px 25px -5px black;
        }

        .ad-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #b57c1a, 0 10px 20px -5px black;
        }

        .close-btn {
            position: absolute;
            top: 12px;
            right: 16px;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.6);
            z-index: 20;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(2px);
            transition: 0.15s;
        }

        .close-btn:hover {
            background: rgba(255, 100, 100, 0.8);
            color: white;
        }

        /* small arrow hint for auto‑click simulation (optional but adds realism) */
        .fake-cursor {
            position: fixed;
            width: 22px;
            height: 22px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="black" stroke="white" stroke-width="1.2"><path d="M5.5 3.5L18 16l-5.5 1.5L9 22l-3-7-5-2 4.5-4.5L5.5 3.5z"/></svg>') no-repeat center;
            background-size: contain;
            pointer-events: none;
            z-index: 9999;
            filter: drop-shadow(2px 4px 4px rgba(0,0,0,0.5));
            transition: left 0.05s linear, top 0.05s linear;
            will-change: left, top;
            opacity: 0;  /* hidden by default, shown during auto‑click */
        }

        /* small label to show countdown – optional but user‑friendly */
        .countdown-badge {
            position: absolute;
            bottom: 12px;
            right: 18px;
            background: rgba(0,0,0,0.6);
            color: #ffd966;
            font-size: 13px;
            padding: 3px 10px;
            border-radius: 30px;
            backdrop-filter: blur(3px);
            font-weight: 600;
            border: 1px solid #ffd96655;
            z-index: 15;
        }
    </style>
</head>
<body>

    <!-- floating cursor (arrow) – appears only during auto‑click sequence -->
    <div id="fakeCursor" class="fake-cursor"></div>

    <div class="ad-container" id="adBox">
        <div class="close-btn" onclick="closeAd()" id="closeButton">✕</div>
        <div class="ad-title">⚡ FLASH SALE</div>
        <div class="ad-text">
            Complete Web bundle<br>HTML, CSS, JavaScript<br>
            <span style="font-weight: 300; font-size: 13px; display: block; margin-top: 6px;">80% off · today only</span>
        </div>
        <!-- real link: opens in same tab (no target="_blank") -->
        <a href="https://www.example.com/web-dev-offer" class="ad-btn" id="enrollBtn">🎓 Enroll now</a>
        <!-- countdown indicator (vanishes after click) -->
        <div class="countdown-badge" id="countdownBadge">auto 3s</div>
    </div>

    <script>
        (function() {
            'use strict';

            // ----- ELEMENTS -----
            const adContainer = document.getElementById('adBox');
            const enrollButton = document.getElementById('enrollBtn');
            const fakeCursor = document.getElementById('fakeCursor');
            const countdownBadge = document.getElementById('countdownBadge');

            // ----- close function (global for onclick) -----
            window.closeAd = function() {
                adContainer.style.display = 'none';
                // hide cursor if animation running
                fakeCursor.style.opacity = '0';
                // clear any running timers (safety)
                if (window._clickTimer) clearTimeout(window._clickTimer);
                if (window._countdownInterval) clearInterval(window._countdownInterval);
            };

            // ----- ensure cursor is initially hidden -----
            fakeCursor.style.opacity = '0';

            // ----- force real mouse cursor style on button & body (arrow everywhere) -----
            // set body cursor to default (arrow)
            document.body.style.cursor = 'default';
            // but button should have pointer to indicate clickable (real hand appears on hover)
            // but we keep pointer as normal arrow? user expects hand, we keep both: 
            // while auto‑click we simulate arrow moving, but original cursor remains.
            // we set button cursor to 'pointer' so real mouse gets hand – that's fine.
            enrollButton.style.cursor = 'pointer';  

            // ----- hide the fake cursor when real mouse moves (so it doesn't interfere) -----
            document.addEventListener('mousemove', function() {
                fakeCursor.style.opacity = '0';
            });

            // ----- auto‑click after 3 seconds with simulated arrow movement -----
            let timerActive = true;          // allow fresh start
            let countdown = 3;                // seconds

            // update countdown badge
            function updateBadge(text) {
                if (countdownBadge) countdownBadge.innerText = text;
            }
            updateBadge('auto 3s');

            // countdown interval
            const countdownInterval = setInterval(function() {
                if (!timerActive) return;      // stop if ad closed or clicked
                countdown -= 1;
                if (countdown >= 1) {
                    updateBadge(`auto ${countdown}s`);
                } else if (countdown === 0) {
                    updateBadge('clicking...');
                } else {
                    // just in case
                    clearInterval(countdownInterval);
                }
            }, 1000);
            window._countdownInterval = countdownInterval;

            // main timer: after 3s perform the simulated click
            window._clickTimer = setTimeout(function() {
                // if ad was closed in the meantime, do nothing
                if (!timerActive || adContainer.style.display === 'none') {
                    fakeCursor.style.opacity = '0';
                    return;
                }

                // get button position and viewport info
                const btnRect = enrollButton.getBoundingClientRect();
                const startX = window.innerWidth / 2;      // begin from center of screen
                const startY = window.innerHeight / 2;
                const targetX = btnRect.left + btnRect.width / 2;
                const targetY = btnRect.top + btnRect.height / 2;

                // steps for smooth movement (30ms per step ≈ 0.03s, total ~0.3s)
                const steps = 12;                // 12 * 30ms = 360ms movement
                let currentStep = 0;

                // show cursor
                fakeCursor.style.opacity = '1';
                fakeCursor.style.left = startX + 'px';
                fakeCursor.style.top = startY + 'px';

                // move function
                function moveCursor() {
                    if (!timerActive || adContainer.style.display === 'none') {
                        fakeCursor.style.opacity = '0';
                        return;
                    }
                    if (currentStep <= steps) {
                        const progress = currentStep / steps;  // 0 .. 1
                        // easeOutQuad for smooth deceleration (feels natural)
                        const eased = 1 - Math.pow(1 - progress, 2);
                        const currentX = startX + (targetX - startX) * eased;
                        const currentY = startY + (targetY - startY) * eased;

                        fakeCursor.style.left = currentX + 'px';
                        fakeCursor.style.top = currentY + 'px';

                        currentStep++;
                        requestAnimationFrame(() => {
                            setTimeout(moveCursor, 24);  // ~24ms per frame ≈ 40fps
                        });
                    } else {
                        // cursor reached button – perform click
                        // but before that, ensure we are exactly on button (final position)
                        fakeCursor.style.left = targetX + 'px';
                        fakeCursor.style.top = targetY + 'px';

                        // tiny delay to look like natural click (hover then click)
                        setTimeout(() => {
                            if (!timerActive || adContainer.style.display === 'none') {
                                fakeCursor.style.opacity = '0';
                                return;
                            }
                            // make button "hover" effect via style (optional)
                            enrollButton.style.backgroundColor = '#ffe289';
                            enrollButton.style.transform = 'translateY(-2px)';
                            enrollButton.style.boxShadow = '0 10px 0 #b57c1a, 0 15px 25px -5px black';

                            // simulate click: blink cursor (tiny scale)
                            fakeCursor.style.transform = 'scale(1.2)';
                            setTimeout(() => fakeCursor.style.transform = 'scale(1)', 70);

                            // after 120ms, trigger the actual click + revert button
                            setTimeout(() => {
                                // reset button style (as if clicked)
                                enrollButton.style.backgroundColor = '#ffd966';
                                enrollButton.style.transform = 'translateY(4px)';
                                enrollButton.style.boxShadow = '0 4px 0 #b57c1a, 0 10px 20px -5px black';

                                // --- PROGRAMMATIC CLICK that opens link in same tab ---
                                // Method: create a plain mouse event with all details like real click
                                const clickEvent = new MouseEvent('click', {
                                    view: window,
                                    bubbles: true,
                                    cancelable: true,
                                    button: 0,        // left button
                                    buttons: 1,
                                    clientX: targetX,
                                    clientY: targetY
                                });
                                enrollButton.dispatchEvent(clickEvent);

                                // fallback: directly navigate if preventDefault isn't called (normal link)
                                // but we let the event do its job. However, if the link has href,
                                // the default action will open it. That's what we want.
                                // (No target="_blank" => same tab)

                                // small reset cursor fade after click
                                setTimeout(() => {
                                    fakeCursor.style.opacity = '0';
                                }, 200);

                                // stop countdown & timer flags
                                timerActive = false;
                                clearInterval(countdownInterval);
                                updateBadge('clicked');
                            }, 120);  // hold hover briefly
                        }, 60);
                    }
                }

                moveCursor();

            }, 3000); // 3 seconds

            // if user manually clicks, we cancel auto simulation (to avoid double action)
            enrollButton.addEventListener('click', function(e) {
                // still allow manual click, but disable auto sequence & hide fake cursor
                timerActive = false;
                fakeCursor.style.opacity = '0';
                clearInterval(countdownInterval);
                updateBadge('clicked');
                // clear main timer
                if (window._clickTimer) clearTimeout(window._clickTimer);
                // note: we do NOT prevent default – link opens normally.
            });

            // if ad is closed via X, clean everything
            const closeBtn = document.getElementById('closeButton');
            closeBtn.addEventListener('click', function() {
                timerActive = false;
                fakeCursor.style.opacity = '0';
                clearInterval(countdownInterval);
                if (window._clickTimer) clearTimeout(window._clickTimer);
                // close function already hides container
            });

            // minor: if page unload, cancel timers (hygiene)
            window.addEventListener('beforeunload', function() {
                if (window._clickTimer) clearTimeout(window._clickTimer);
                if (window._countdownInterval) clearInterval(window._countdownInterval);
            });

        })();
    </script>
    <!-- note: the link points to example.com (change to real offer) – same tab -->
</body>
</html>
